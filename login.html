<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Geo Helper Login</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0d0f14;
      color: #e8eaf2;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .box {
      background: #151820;
      padding: 40px;
      border-radius: 12px;
      width: 320px;
      border: 1px solid #252b3b;
    }

    h2 {
      text-align: center;
      margin-bottom: 20px;
    }

    input {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border-radius: 8px;
      border: 1px solid #333;
      background: #1c2030;
      color: white;
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      background: #4f8ef7;
      border: none;
      color: white;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
    }

    button:hover {
      opacity: 0.9;
    }

    .switch {
      margin-top: 15px;
      text-align: center;
      font-size: 13px;
      color: #5a6480;
      cursor: pointer;
    }

    .msg {
      text-align: center;
      margin-top: 10px;
      font-size: 13px;
      color: #fbbf24;
    }
  </style>
</head>

<body>

<div class="box">
  <h2>Geo Helper Login</h2>

  <input type="email" id="email" placeholder="Email">
  <input type="password" id="password" placeholder="Password">

  <button onclick="auth()">Login / Sign Up</button>

  <div class="msg" id="msg"></div>

  <div class="switch" onclick="logout()">
    Logout
  </div>
</div>

<script>
  
  const supabaseUrl = "https://gdtbszggjtshsewiixrb.supabase.co";
const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdkdGJzemdnanRzaHNld2lpeHJiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI1NzY5NjgsImV4cCI6MjA5ODE1Mjk2OH0.5eyX7K0-VO8DfpNGmoMD7xlEZTmwONDaZQAtTVpKXYg";

const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

async function auth() {
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value;

  if (!email || !password) {
    document.getElementById("msg").innerText = "Please enter your email and password.";
    return;
  }

  // Try logging in first
  const { data, error } = await supabaseClient.auth.signInWithPassword({
    email,
    password
  });

  if (!error) {
    document.getElementById("msg").innerText = "Logged in!";
    window.location.href = "pay.html";
    return;
  }

  // If login fails, try creating an account
  const { data: signupData, error: signupError } =
    await supabaseClient.auth.signUp({
      email,
      password
    });

  if (signupError) {
    document.getElementById("msg").innerText = signupError.message;
    return;
  }

  document.getElementById("msg").innerText =
    "Account created! Please check your email if confirmation is enabled.";

  // If email confirmation is disabled, redirect immediately
  if (signupData.user && signupData.session) {
    window.location.href = "pay.html";
  }
}

async function logout() {
  await supabaseClient.auth.signOut();
  localStorage.removeItem("user");
  document.getElementById("msg").innerText = "Logged out";
}
</script>

</body>
</html>
