<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Geo Helper | Upgrade</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0d0f14;
      color: #e8eaf2;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .card {
      background: #151820;
      padding: 40px;
      border-radius: 12px;
      width: 340px;
      border: 1px solid #252b3b;
      text-align: center;
    }

    button {
      width: 100%;
      padding: 14px;
      margin-top: 20px;
      background: #4f8ef7;
      border: none;
      color: white;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
    }

    button:hover {
      opacity: 0.9;
    }

    .small {
      margin-top: 15px;
      font-size: 12px;
      color: #5a6480;
    }
  </style>
</head>

<body>

<div class="card">
  <h2>Geo Helper Pro</h2>
  <p>Unlock premium features</p>

  <button onclick="pay()">Pay with Stripe</button>

  <div class="small">Secure checkout via Stripe</div>
</div>

<script type="module">
/* =========================
   CONFIG (YOUR EXISTING)
========================= */
const SUPABASE_URL = "https://gdtbszggjtshsewiixrb.supabase.co";
const STRIPE_PRICE_ID = "YOUR_PRICE_ID"; // optional if already handled in Edge Function

/* =========================
   GET USER SESSION (WEB VERSION)
========================= */
function getSession() {
  return JSON.parse(localStorage.getItem("sb_session"));
}

/* =========================
   START CHECKOUT (USES YOUR EDGE FUNCTION)
========================= */
async function startCheckoutWeb() {
  const session = getSession();

  if (!session?.access_token) {
    alert("Please log in first.");
    window.location.href = "login.html";
    return;
  }

  const res = await fetch(`${SUPABASE_URL}/functions/v1/create-checkout-session`, {
    method: "POST",
    headers: {
      Authorization: `Bearer ${session.access_token}`,
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      priceId: STRIPE_PRICE_ID
    })
  });

  const data = await res.json();

  if (!res.ok) {
    alert(data.error || "Checkout failed");
    return;
  }

  // Redirect to Stripe Checkout
  window.location.href = data.url;
}

/* =========================
   BUTTON
========================= */
window.pay = async function () {
  try {
    await startCheckoutWeb();
  } catch (e) {
    alert(e.message);
  }
};
</script>

</body>
</html>
